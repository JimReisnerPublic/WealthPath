name: Keep API Warm

on:
  schedule:
    # Every 5 minutes, Mon–Fri, 8am–7pm ET (13:00–00:00 UTC, accounting for EST)
    - cron: '*/5 13-23 * * 1-5'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl --fail --silent --show-error --max-time 60 \
            https://ca-wealthpath-api.agreeablegrass-ff2262e8.eastus.azurecontainerapps.io/healthz
